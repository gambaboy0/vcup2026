<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V CUP 2026 | ヴァリエンテ富山ジュニア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1B8FD4;
      --primary-dark: #1470a8;
      --white: #FFFFFF;
      --gold: #F5B400;
      --gold-dark: #d49b00;
      --bg: #f4f8fc;
      --text: #1a1a1a;
      --gray: #757575;
      --gray-light: #e8edf2;
      --red: #E53935;
      --max-width: 1100px;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      background: var(--bg);
      padding-top: 44px; /* notice banner height */
    }

    /* --- Notice Banner --- */
    .notice-banner {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: var(--red);
      color: var(--white);
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 16px;
      z-index: 1000;
      line-height: 1.4;
    }

    /* --- Hero Header --- */
    .site-header {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 44px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    @media (min-width: 768px) {
      .site-header { min-height: 680px; }
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* グラデーションオーバーレイ：上部は薄く、下部（テキスト・ボタンエリア）は濃く */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.04) 0%,
        rgba(10,40,80,0.12) 35%,
        rgba(10,40,80,0.65) 68%,
        rgba(10,40,80,0.88) 100%
      );
    }

    .header-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: var(--max-width);
      padding: 20px 20px 40px;
      text-align: center;
    }

    .header-logo {
      font-size: clamp(1.9rem, 7vw, 4rem);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.55);
      margin-bottom: 6px;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.9);
      font-size: clamp(0.82rem, 2.2vw, 1rem);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .header-meta span {
      background: rgba(255,255,255,0.18);
      color: var(--white);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.38);
      backdrop-filter: blur(4px);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* --- U8 / U9 ボタン --- */
    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
      margin: 0 auto;
    }

    @media (min-width: 500px) {
      .hero-buttons { flex-direction: row; }
    }

    .hero-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 16px;
      padding: 20px 16px 16px;
      text-decoration: none;
      color: var(--white);
      transition: all 0.25s ease;
      text-align: center;
    }

    .hero-btn:hover, .hero-btn:focus {
      background: rgba(255,255,255,0.26);
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }

    .hero-btn.u9 {
      border-color: rgba(245,180,0,0.7);
      background: rgba(245,180,0,0.18);
    }

    .hero-btn.u9:hover, .hero-btn.u9:focus {
      background: rgba(245,180,0,0.32);
      border-color: var(--gold);
    }

    .hero-btn-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }

    .hero-btn-title {
      font-size: clamp(1.25rem, 4.5vw, 1.6rem);
      font-weight: 700;
      color: var(--white);
      text-shadow: 0 1px 6px rgba(0,0,0,0.35);
      line-height: 1.2;
    }

    .hero-btn.u9 .hero-btn-title { color: var(--gold); }

    .hero-btn-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.78);
      margin-top: 1px;
    }

    .hero-btn-arrow {
      font-size: 1.2rem;
      color: var(--gold);
      margin-top: 6px;
      display: block;
    }

    /* --- Container --- */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 16px;
    }

    section { padding: 40px 16px; }

    .section-title {
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: 700;
      color: var(--primary);
      border-left: 5px solid var(--gold);
      padding-left: 14px;
      margin-bottom: 24px;
    }

    /* --- Overview Grid --- */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .overview-card {
      background: var(--white);
      border-radius: 12px;
      padding: 20px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .overview-card .ov-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
    .overview-card .ov-label { font-size: 0.75rem; color: var(--gray); font-weight: 700; margin-bottom: 4px; letter-spacing: 0.04em; }
    .overview-card .ov-value { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.4; }

    /* --- Access --- */
    .map-wrapper { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.12); margin-bottom: 16px; }
    .map-wrapper iframe { display: block; width: 100%; height: 350px; border: 0; }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: var(--text);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-gold:hover { background: var(--gold-dark); }

    /* --- Parking --- */
    .placeholder-box {
      border: 2px dashed #b0bec5;
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      color: var(--gray);
      font-size: 0.95rem;
      background: #f9fafb;
      line-height: 1.7;
    }

    /* --- Footer --- */
    .site-footer {
      background: var(--primary-dark);
      color: rgba(255,255,255,0.8);
      text-align: center;
      font-size: 0.82rem;
      padding: 20px 16px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Notice Banner -->
  <div class="notice-banner" role="alert">
    ⚠️ 現在準備中です。情報は順次更新します。
  </div>

  <!-- Hero Header -->
  <header class="site-header">
    <img src="vcup_hero.jpg" alt="V CUP 2026 ヴァリエンテ富山ジュニア" class="hero-img">
    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="header-content">
      <h1 class="header-logo">V CUP 2026</h1>
      <p class="header-subtitle">ヴァリエンテ富山ジュニア 主催</p>
      <div class="header-meta">
        <span>📅 2026年7月18日（土）</span>
        <span>📍 薬勝寺池南公園サッカー場</span>
      </div>
      <!-- U8 / U9 選択ボタン -->
      <div class="hero-buttons">
        <a href="vcup2026_u8.html" class="hero-btn">
          <span class="hero-btn-label">Category</span>
          <span class="hero-btn-title">U8 午前の部</span>
          <span class="hero-btn-sub">16チーム参加</span>
          <span class="hero-btn-arrow">→</span>
        </a>
        <a href="vcup2026_u9.html" class="hero-btn u9">
          <span class="hero-btn-label">Category</span>
          <span class="hero-btn-title">U9 午後の部</span>
          <span class="hero-btn-sub">14チーム参加</span>
          <span class="hero-btn-arrow">→</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Overview -->
  <section>
    <div class="container">
      <h2 class="section-title">大会概要</h2>
      <div class="overview-grid">
        <div class="overview-card">
          <div class="ov-icon" aria-hidden="true">📅</div>
          <div>
            <div class="ov-label">開催日</div>
            <div class="ov-value">2026年7月18日（土）</div>
          </div>
        </div>
        <div class="overview-card">
          <div class="ov-icon" aria-hidden="true">📍</div>
          <div>
            <div class="ov-label">会場</div>
            <div class="ov-value">薬勝寺池南公園サッカー場</div>
          </div>
        </div>
        <div class="overview-card">
          <div class="ov-icon" aria-hidden="true">⚽</div>
          <div>
            <div class="ov-label">形式</div>
            <div class="ov-value">グループリーグ＋トーナメント</div>
          </div>
        </div>
        <div class="overview-card">
          <div class="ov-icon" aria-hidden="true">🏆</div>
          <div>
            <div class="ov-label">主催</div>
            <div class="ov-value">ヴァリエンテ富山ジュニア</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Access -->
  <section>
    <div class="container">
      <h2 class="section-title">アクセス</h2>
      <div class="map-wrapper">
        <iframe
          src="https://maps.google.com/maps?q=薬勝寺池南公園サッカー場&output=embed"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="薬勝寺池南公園サッカー場 地図"
        ></iframe>
      </div>
      <a href="https://maps.app.goo.gl/dgMBXyNR3o1UKxbf6" target="_blank" rel="noopener noreferrer" class="btn-gold">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Google マップで開く
      </a>
    </div>
  </section>

  <!-- Parking -->
  <section>
    <div class="container">
      <h2 class="section-title">駐車場案内</h2>
      <div class="placeholder-box">
        駐車場情報は準備中です。<br>
        決まり次第こちらに掲載します。
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>© 2026 ヴァリエンテ富山ジュニア</p>
  </footer>

</body>
</html>
